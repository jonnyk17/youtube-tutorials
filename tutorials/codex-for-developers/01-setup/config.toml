# Minimal Codex config for normal development work.
#
# Copy this to ~/.codex/config.toml if you want:
# - edits inside the current project
# - approval prompts only when crossing boundaries
# - internet access for installs and API calls

sandbox_mode = "workspace-write"
approval_policy = "on-request"

[sandbox_workspace_write]
network_access = true

# Optional review-only profile.
