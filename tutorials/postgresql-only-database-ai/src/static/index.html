<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus Cloud Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
    <style>
        .messages-scroll::-webkit-scrollbar { width: 4px; }
        .messages-scroll::-webkit-scrollbar-track { background: transparent; }
        .messages-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 999px; }
        @keyframes pulse-dot {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }
        .typing-dot { animation: pulse-dot 1.4s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-gray-50 font-sans h-screen flex flex-col">
    <!-- Header -->
    <div class="bg-white border-b border-gray-200">
        <div class="max-w-2xl mx-auto px-6 py-5">
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Nimbus Cloud Support</h1>
        </div>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto messages-scroll">
        <div class="max-w-2xl mx-auto px-6 py-8 flex flex-col gap-6" id="messages-inner"></div>
    </div>

    <!-- Input -->
    <div class="bg-white border-t border-gray-200">
        <div class="max-w-2xl mx-auto px-6 py-4">
            <div class="flex gap-3 items-center bg-gray-50 border border-gray-200 rounded-2xl px-4 py-1 focus-within:border-gray-400 focus-within:bg-white transition-colors">
                <input
                    type="text"
                    id="input"
                    placeholder="Ask a question..."
                    autocomplete="off"
                    class="flex-1 py-3 bg-transparent text-base text-gray-900 placeholder-gray-400 outline-none"
                />
                <button
                    id="send"
                    onclick="sendMessage()"
                    class="p-2 rounded-xl bg-gray-900 hover:bg-gray-700 disabled:bg-gray-200 text-white disabled:text-gray-400 transition-colors cursor-pointer disabled:cursor-not-allowed"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById("messages");
        const messagesInner = document.getElementById("messages-inner");
        const inputEl = document.getElementById("input");
        const sendBtn = document.getElementById("send");

        inputEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !sendBtn.disabled) sendMessage();
        });

        inputEl.focus();

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            addMessage(message, "user");
            inputEl.value = "";
            sendBtn.disabled = true;

            const { row, content } = addMessage("", "assistant");

            // Show typing indicator
            const typing = document.createElement("div");
            typing.className = "flex gap-1 items-center h-5";
            typing.innerHTML = `
                <span class="typing-dot w-1.5 h-1.5 bg-gray-400 rounded-full"></span>
                <span class="typing-dot w-1.5 h-1.5 bg-gray-400 rounded-full"></span>
                <span class="typing-dot w-1.5 h-1.5 bg-gray-400 rounded-full"></span>`;
            content.appendChild(typing);

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message }),
                });

                typing.remove();

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    content.textContent += decoder.decode(value);
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                }
            } catch (err) {
                typing.remove();
                content.textContent = "Error: could not reach the server.";
                content.classList.add("text-red-500");
            }

            sendBtn.disabled = false;
            inputEl.focus();
        }

        function addMessage(text, role) {
            const row = document.createElement("div");

            if (role === "user") {
                row.className = "w-full flex justify-end";
                row.innerHTML = `<div class="max-w-[80%] px-4 py-3 rounded-2xl bg-gray-100 text-base text-gray-800 leading-relaxed"></div>`;
                row.querySelector("div").textContent = text;
            } else {
                row.className = "w-full";
                row.innerHTML = `<div class="text-base text-gray-800 leading-relaxed whitespace-pre-wrap"></div>`;
            }

            const content = row.querySelector("div");

            messagesInner.appendChild(row);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            return { row, content };
        }
    </script>
</body>
</html>
