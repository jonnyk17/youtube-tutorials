<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostgreSQL RAG Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1117;
            color: #e4e4e7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 720px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #f4f4f5;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #71717a;
            margin-bottom: 1.5rem;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding-bottom: 1rem;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .message.user {
            background: #1e3a5f;
            color: #bfdbfe;
            align-self: flex-end;
            max-width: 80%;
        }

        .message.assistant {
            background: #1c1c22;
            color: #d4d4d8;
            align-self: flex-start;
            max-width: 90%;
            border: 1px solid #27272a;
        }

        .input-row {
            display: flex;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid #27272a;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #27272a;
            background: #18181b;
            color: #f4f4f5;
            font-size: 0.95rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #3b82f6;
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        button:disabled {
            background: #27272a;
            color: #52525b;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PostgreSQL RAG Chatbot</h1>
        <p class="subtitle">Ask questions about PostgreSQL, pgvector, and RAG</p>

        <div class="messages" id="messages"></div>

        <div class="input-row">
            <input type="text" id="input" placeholder="Ask a question..." autocomplete="off" />
            <button id="send" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById("messages");
        const inputEl = document.getElementById("input");
        const sendBtn = document.getElementById("send");

        inputEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !sendBtn.disabled) {
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, "user");
            inputEl.value = "";
            sendBtn.disabled = true;

            // Add empty assistant message
            const assistantEl = addMessage("", "assistant");

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    assistantEl.textContent += decoder.decode(value);
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                }
            } catch (err) {
                assistantEl.textContent = "Error: could not reach the server.";
            }

            sendBtn.disabled = false;
            inputEl.focus();
        }

        function addMessage(text, role) {
            const el = document.createElement("div");
            el.className = `message ${role}`;
            el.textContent = text;
            messagesEl.appendChild(el);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return el;
        }
    </script>
</body>
</html>
